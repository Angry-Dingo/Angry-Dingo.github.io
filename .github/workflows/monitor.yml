name: LOF Fund Monitor

on:
  schedule:
    # 工作日8:00-14:00每10分钟运行一次（北京时间）
    - cron: '0 0 * * 1-5'   # 8:00
    - cron: '10 0 * * 1-5'  # 8:10
    - cron: '20 0 * * 1-5'  # 8:20
    - cron: '30 0 * * 1-5'  # 8:30
    - cron: '40 0 * * 1-5'  # 8:40
    - cron: '50 0 * * 1-5'  # 8:50
    - cron: '0 1 * * 1-5'   # 9:00
    - cron: '10 1 * * 1-5'  # 9:10
    - cron: '20 1 * * 1-5'  # 9:20
    - cron: '30 1 * * 1-5'  # 9:30
    - cron: '40 1 * * 1-5'  # 9:40
    - cron: '50 1 * * 1-5'  # 9:50
    - cron: '0 2 * * 1-5'   # 10:00
    - cron: '10 2 * * 1-5'  # 10:10
    - cron: '20 2 * * 1-5'  # 10:20
    - cron: '30 2 * * 1-5'  # 10:30
    - cron: '40 2 * * 1-5'  # 10:40
    - cron: '50 2 * * 1-5'  # 10:50
    - cron: '0 3 * * 1-5'   # 11:00
    - cron: '10 3 * * 1-5'  # 11:10
    - cron: '20 4 * * 1-5'  # 12:20
    - cron: '30 4 * * 1-5'  # 12:30
    - cron: '40 4 * * 1-5'  # 12:40
    - cron: '50 4 * * 1-5'  # 12:50
    - cron: '0 5 * * 1-5'   # 13:00
    - cron: '10 5 * * 1-5'  # 13:10
    - cron: '20 5 * * 1-5'  # 13:20
    - cron: '30 5 * * 1-5'  # 13:30
    - cron: '40 5 * * 1-5'  # 13:40
    - cron: '50 5 * * 1-5'  # 13:50
    - cron: '0 6 * * 1-5'   # 14:00
  # 手动触发
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run monitor script
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: node monitor.js