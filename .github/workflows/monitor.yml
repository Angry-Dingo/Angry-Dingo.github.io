name: LOF Fund Monitor

on:
  schedule:
    # 工作日9:15-14:55每10分钟运行一次（北京时间）
    - cron: '15 1 * * 1-5'  # 9:15
    - cron: '25 1 * * 1-5'  # 9:25
    - cron: '35 1 * * 1-5'  # 9:35
    - cron: '45 1 * * 1-5'  # 9:45
    - cron: '55 1 * * 1-5'  # 9:55
    - cron: '5 2 * * 1-5'   # 10:05
    - cron: '15 2 * * 1-5'  # 10:15
    - cron: '25 2 * * 1-5'  # 10:25
    - cron: '35 2 * * 1-5'  # 10:35
    - cron: '45 2 * * 1-5'  # 10:45
    - cron: '55 2 * * 1-5'  # 10:55
    - cron: '5 3 * * 1-5'   # 11:05
    - cron: '15 3 * * 1-5'  # 11:15
    - cron: '25 3 * * 1-5'  # 11:25
    - cron: '35 3 * * 1-5'  # 11:35
    - cron: '55 4 * * 1-5'  # 12:55
    - cron: '5 5 * * 1-5'   # 13:05
    - cron: '15 5 * * 1-5'  # 13:15
    - cron: '25 5 * * 1-5'  # 13:25
    - cron: '35 5 * * 1-5'  # 13:35
    - cron: '45 5 * * 1-5'  # 13:45
    - cron: '55 5 * * 1-5'  # 13:55
    - cron: '5 6 * * 1-5'   # 14:05
    - cron: '15 6 * * 1-5'  # 14:15
    - cron: '25 6 * * 1-5'  # 14:25
    - cron: '35 6 * * 1-5'  # 14:35
    - cron: '45 6 * * 1-5'  # 14:45
    - cron: '55 6 * * 1-5'  # 14:55
  # 手动触发
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run monitor script
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: node monitor.js